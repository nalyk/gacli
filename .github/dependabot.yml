version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # @types/node MUST match the lowest supported runtime, not the newest.
    # `engines.node` in package.json pins us to Node 22+, so we hold @types/node
    # at the 22.x major. Re-evaluate this rule when raising the minimum runtime.
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
    groups:
      types:
        patterns:
          - '@types/*'
      google-analytics:
        patterns:
          - '@google-analytics/*'
      tooling:
        patterns:
          - '@biomejs/*'
          - 'vitest'
          - '@vitest/*'
          - 'tsx'
          - 'typescript'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
