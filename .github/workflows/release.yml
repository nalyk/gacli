name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create GitHub Releases + push tags
  id-token: write   # required for npm provenance attestation

jobs:
  release:
    name: build + publish + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so release-notes generation works

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          # registry-url + scope wires npm/pnpm to read NODE_AUTH_TOKEN for publish
          registry-url: 'https://registry.npmjs.org'
          scope: '@nalyk'

      - run: pnpm install --frozen-lockfile

      - name: Verify (lint + type-check + test + build)
        run: pnpm verify

      - name: Pack tarball
        run: pnpm pack

      - name: Smoke-test packed tarball (mimic real `npm install -g`)
        run: |
          TARBALL=$(ls "$GITHUB_WORKSPACE"/*.tgz)
          echo "Installing $TARBALL globally..."
          npm install -g "$TARBALL"
          echo "Verifying gacli is on PATH and runs..."
          gacli --version
          gacli --help > /dev/null
          gacli mcp serve --help > /dev/null

      - name: Detect prerelease
        id: prerelease
        run: |
          # Pre-release tags (v1.2.3-beta.1, v2.0.0-rc.1) publish under `next`/`beta` dist-tag,
          # not `latest`, so they don't overwrite the stable channel.
          if [[ "${{ github.ref_name }}" =~ - ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          npm publish \
            --access public \
            --provenance \
            --tag "${{ steps.prerelease.outputs.tag }}"

      - name: Smoke-test the published package (real-world install)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Wait briefly for npm registry CDN to propagate the new version, then install
          # from the registry (not the local tarball) to verify a real user install works.
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for $PKG_NAME@$PKG_VERSION to appear on registry..."
          for i in 1 2 3 4 5; do
            if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
              echo "Found on registry."
              break
            fi
            echo "Not visible yet (attempt $i/5), sleeping 5s..."
            sleep 5
          done
          npm uninstall -g "$PKG_NAME" 2>/dev/null || true
          npm install -g "$PKG_NAME@$PKG_VERSION"
          gacli --version
          gacli --help > /dev/null

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use GitHub's auto-generated changelog from PRs/commits since the last tag.
          # If this is the first tag, GitHub falls back to all commits.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ github.ref_name }}" \
              -f previous_tag_name="$PREV_TAG" \
              -q .body > release-notes.md
          else
            gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ github.ref_name }}" \
              -q .body > release-notes.md
          fi
          # Append npm install instructions
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          {
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "npm install -g ${PKG_NAME}@${PKG_VERSION}"
            echo '```'
            echo
            echo "This release is published with [npm provenance](https://docs.npmjs.com/generating-provenance-statements) — verify with \`npm audit signatures\`."
          } >> release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            *.tgz
