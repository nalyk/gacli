name: release

# OIDC Trusted Publishing to npm (no NPM_TOKEN — no token at all).
# Triggers on v*.*.* tags. The npm registry verifies the GitHub OIDC token
# against the trusted-publisher relationship configured at:
#   https://www.npmjs.com/package/@nalyk/gacli/access → Trusted Publishers
# Mismatch → 401 at the publish step.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # create GitHub Releases + push tags
  id-token: write   # OIDC trusted publishing — required for npm to verify our identity

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build + publish + release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@nalyk/gacli
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so release-notes generation works

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1. Node 22 LTS ships with
      # npm 10.x. Self-upgrading via `npm install -g npm@latest` fails on the
      # GitHub runner with "MODULE_NOT_FOUND: promise-retry" — the bundled
      # npm@10 has incomplete dependencies that can't reify a self-replacement.
      # Even --force doesn't help: it's the existing npm that breaks, not the
      # install operation. Workaround: install the new npm to a separate
      # prefix and prepend it to PATH, never touching the broken global npm.
      - name: Install npm@latest to a local prefix (PATH-prepended)
        run: |
          mkdir -p /tmp/npm-cli
          npm install --prefix /tmp/npm-cli --no-audit --no-fund npm@latest
          echo "/tmp/npm-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Verify npm version is >=11.5.1
        run: |
          which npm
          npm --version
          MAJOR=$(node -p "require('/tmp/npm-cli/node_modules/npm/package.json').version.split('.')[0] | 0")
          if [ "$MAJOR" -lt 11 ]; then
            echo "::error::npm major < 11; OIDC publishing requires >= 11.5.1"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (=$TAG) does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Tag and package.json version both = $PKG"

      - name: Verify (lint + type-check + test + build)
        run: pnpm verify

      - name: Smoke-test the local pack (mimic real `npm install -g`)
        run: |
          pnpm pack
          TARBALL=$(ls "$GITHUB_WORKSPACE"/*.tgz)
          npm install -g "$TARBALL"
          gacli --version
          gacli --help > /dev/null
          gacli mcp serve --help > /dev/null

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ - ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Idempotency guard — makes `gh run rerun` and `workflow_dispatch` safe.
      - name: Skip publish if version already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${NAME}@${VERSION} already on npm — skipping publish step."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # No --provenance flag, no NODE_AUTH_TOKEN — OIDC handles both.
      # npm auto-generates provenance attestation when publishing via trusted publishing.
      - name: Publish to npm via OIDC trusted publishing
        if: steps.check.outputs.already_published == 'false'
        run: |
          npm publish --access public --tag "${{ steps.prerelease.outputs.tag }}"

      - name: Smoke-test the published package (real-world install path)
        if: steps.check.outputs.already_published == 'false'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for $PKG_NAME@$PKG_VERSION to appear on registry..."
          for i in 1 2 3 4 5; do
            if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
              echo "Found on registry."
              break
            fi
            echo "Not visible yet (attempt $i/5), sleeping 5s..."
            sleep 5
          done
          npm uninstall -g "$PKG_NAME" 2>/dev/null || true
          npm install -g "$PKG_NAME@$PKG_VERSION"
          gacli --version
          gacli --help > /dev/null

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          # If a release for this tag already exists, leave it alone (idempotency).
          if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — leaving it alone."
            exit 0
          fi

          PRERELEASE_FLAG=""
          if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Generate notes from PR/commit log since previous tag.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${GITHUB_REF_NAME}" \
              -f previous_tag_name="$PREV_TAG" \
              -q .body > release-notes.md
          else
            gh api -X POST /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${GITHUB_REF_NAME}" \
              -q .body > release-notes.md
          fi

          {
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "npm install -g ${PKG_NAME}@${PKG_VERSION}"
            echo '```'
            echo
            echo "Published via [npm OIDC trusted publishing](https://docs.npmjs.com/trusted-publishers) — verify with \`npm audit signatures\`."
          } >> release-notes.md

          gh release create "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            *.tgz
